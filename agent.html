'type WebhookPayload struct {',
'    Event                         string          `json:"event"`',
'    DepositID                     string          `json:"depositId"`',
'    CustomerID                    string          `json:"customerId"`',
'    Amount                        string          `json:"amount"`',
'    FeesPaid                      string          `json:"feesPaid"`',
'    GrossAmount                   string          `json:"grossAmount"`',
'    GasCharge                     string          `json:"gasCharge"`',
'    Currency                      json.RawMessage `json:"currency"`',

'    OriginalAmount                *string         `json:"originalAmount,omitempty"`',
'    OriginalCurrency              json.RawMessage `json:"originalCurrency,omitempty"`',
'    WebhookDeliveryIdempotencyKey string          `json:"webhookDeliveryIdempotencyKey"`',
'    TxIdempotencyKey              string          `json:"txIdempotencyKey"`',
'}',
'',
'func HandleWebhook(sharedToken string) http.HandlerFunc {',
'    return func(w http.ResponseWriter, r *http.Request) {',
'        if r.Method != http.MethodPost {',
'            http.Error(w, "method not allowed", http.StatusMethodNotAllowed)',
'            return',
'        }',
'        body, err := io.ReadAll(r.Body)',
'        if err != nil {',
'            http.Error(w, "failed to read body", http.StatusBadRequest)',
'            return',
'        }',
'        defer r.Body.Close()',
'        signature := r.Header.Get("X-Signature")',
'        if !verifySignature(body, signature, sharedToken) {',
'            http.Error(w, "invalid signature", http.StatusUnauthorized)',
'            return',
'        }',
'        var payload WebhookPayload',
'        if err := json.Unmarshal(body, &payload); err != nil {',
'            http.Error(w, "invalid payload", http.StatusBadRequest)',
'            return',
'        }',
'        fmt.Printf("Deposit event: %s for customer %s\\n", payload.Event, payload.CustomerID)',
'        w.WriteHeader(http.StatusOK)',
'    }',
'}',
'',
'func verifySignature(body []byte, signature, sharedToken string) bool {',
'    mac := hmac.New(sha256.New, []byte(sharedToken))',
'    mac.Write(body)',
'    expected := hex.EncodeToString(mac.Sum(nil))',
'    return hmac.Equal([]byte(expected), []byte(signature))',
'}',
].join("\n");

'const crypto = require("crypto");',
'',
'function verifySignature(body, signature, sharedToken) {',
'  const expected = crypto.createHmac("sha256", sharedToken).update(body).digest("hex");',
'  return crypto.timingSafeEqual(Buffer.from(expected), Buffer.from(signature));',
'}',
'',
'function webhookHandler(sharedToken) {',
'  return (req, res) => {',
'    const signature = req.headers["x-signature"];',
'    const rawBody = JSON.stringify(req.body);',
'    if (!verifySignature(rawBody, signature, sharedToken)) {',
'      return res.status(401).json({ error: "Invalid signature" });',
'    }',
'    const { event, customerId } = req.body;',
'    console.log("Deposit event: " + event + " for customer " + customerId);',
'    res.sendStatus(200);',
'  };',
'}',
].join("\n");
